workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Build Debug APK
        script: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android-app/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - build@prim-uslugi.uz
        notify:
          success: true
          failure: true
